{{ define "main" }}
<article class="markdown book-article">
  {{ if .Params.category }}
  <div class="page-meta">{{ .Params.category }}</div>
  {{ end }}
  <h1>{{ .Title }}</h1>
  {{ if .Date }}
  <p style="font-size: 0.82rem; color: #555; margin-top: -12px; margin-bottom: 36px; font-family: 'DM Mono', monospace;">
    {{ .Date.Format "January 2, 2006" }}
  </p>
  {{ end }}
  {{ .Content }}
</article>
{{ end }}
