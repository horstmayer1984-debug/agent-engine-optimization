baseURL = "https://agent-engine-optimization.com/"
languageCode = "en"
defaultContentLanguage = "en"
defaultContentLanguageInSubdir = false
title = "Agent Engine Optimization"
theme = "hugo-book"
enableRobotsTXT = true
disablePathToLower = true
disableHugoGeneratorInject = true
disableKinds = ["taxonomy", "term"]

[languages]
  [languages.en]
    languageName = "English"
    languageCode = "en"
    weight = 1
  [languages.es]
    languageName = "Español"
    languageCode = "es"
    title = "Optimización de Motores de Agentes"
    weight = 2

[params]
  BookTheme = "light"
  BookToC = true
  BookSection = "docs"
  BookSearch = true
  BookComments = false
  BookDateFormat = "January 2, 2006"
  description = "Research hub and strategy consultancy for optimizing digital presence for autonomous AI agents."
  images = ["/images/og-default.png"]
  author = "Agent Engine Optimization"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[outputs]
  home = ["HTML", "RSS"]

[minify]
  disableXML = true
  minifyOutput = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"
