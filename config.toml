baseURL = "https://agent-engine-optimization.com/"
languageCode = "en"
title = "Agent Engine Optimization"
theme = "hugo-book"
enableRobotsTXT = false
disablePathToLower = true
disableHugoGeneratorInject = true
disableKinds = ["taxonomy", "term"]

[params]
  BookTheme = "light"
  BookToC = true
  BookSection = "docs"
  BookSearch = true
  BookComments = false
  BookDateFormat = "January 2, 2006"
  description = "Research hub and strategy consultancy for optimizing digital presence for autonomous AI agents."
  images = ["/images/og-default.png"]
  author = "Agent Engine Optimization"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[outputs]
  home = ["HTML", "RSS"]

[minify]
  disableXML = true
  minifyOutput = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"
