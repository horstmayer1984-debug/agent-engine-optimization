baseURL = "https://agent-engine-optimization.com/"
languageCode = "en"
title = "Agent Engine Optimization"
theme = "hugo-book"

enableRobotsTXT = false
disablePathToLower = true

# hugo-book rendert keine Taxonomie-Seiten
disableKinds = ["taxonomy", "term"]

[params]
  BookTheme = "light"
  BookToC = true
  BookSection = "docs"
  BookSearch = true
  BookComments = false
  BookDateFormat = "January 2, 2006"

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4

[outputs]
  home = ["HTML", "RSS", "JSON"]

[minify]
  disableXML = true
  minifyOutput = true

[sitemap]
  changefreq = "weekly"
  priority = 0.5
  filename = "sitemap.xml"
